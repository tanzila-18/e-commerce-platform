<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ title }} - My E-Commerce Site</title>
</head>
<body>
    <h1>Welcome to My E-Commerce Site</h1>
    <h2>Products</h2>
    <ul>
        {% for product in products %}
            <li>
                <a href="{{ url_for('product', product_id=product.id) }}">
                    {{ product.name }}
                </a>
                 - ${{ product.price }}
            </li>
        {% endfor %}
    </ul>
</body>
</html>
